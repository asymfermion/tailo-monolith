# Deploy database migrations + Edge Functions to the linked Supabase dev project.
# GCP / Vertex secrets are stored in Supabase (not GitHub) and are not overwritten here.
#
# Required GitHub repository secrets:
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — Project Settings → Database → database password

name: Deploy Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - 'packages/shared/**'
      - 'packages/backend-core/**'
      - 'packages/ai/**'
      - 'scripts/deploy-supabase.sh'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: sgxtyxvithlmuuofkzlk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations and Edge Functions
        run: npm run deploy:supabase
